name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      trusttunnel_version:
        description: 'TrustTunnel version to build (e.g. 1.0.17)'
        required: false
  schedule:
    # Check for new releases weekly
    - cron: '0 4 * * 1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.version.outputs.should_build }}
    steps:
      - name: Get latest TrustTunnel version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.trusttunnel_version }}" ]; then
            VERSION="${{ github.event.inputs.trusttunnel_version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/TrustTunnel/TrustTunnel/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TrustTunnel version: ${VERSION}"

          # Check if we already have this version published
          EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/${VERSION}" 2>/dev/null || echo "000")

          if [ "${{ github.event_name }}" = "schedule" ] && [ "${EXISTING}" = "200" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published, skipping scheduled build"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.check-release.outputs.version }}
            type=semver,pattern={{version}},value=v${{ needs.check-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.check-release.outputs.version }}
            type=sha
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ needs.check-release.outputs.version }}
            TRUSTTUNNEL_VERSION=${{ needs.check-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
